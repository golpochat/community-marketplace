name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cm
          POSTGRES_PASSWORD: cm_dev_password
          POSTGRES_DB: community_marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cm -d community_marketplace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://cm:cm_dev_password@localhost:5432/community_marketplace_test
      NODE_ENV: test
      RBAC_SEED_ENABLED: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @community-marketplace/api exec prisma generate

      - name: Migrate test database
        run: pnpm --filter @community-marketplace/api exec prisma migrate deploy

      - name: Integration tests
        run: pnpm --filter @community-marketplace/api test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Prisma engines
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/prisma
            apps/api/node_modules/.prisma
          key: prisma-${{ hashFiles('apps/api/prisma/schema.prisma') }}

      - name: Generate Prisma client
        run: pnpm --filter @community-marketplace/api exec prisma generate

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build packages & apps
        run: |
          pnpm --filter "./packages/*" build
          pnpm --filter "./apps/*" build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: false
          tags: community-marketplace/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
