name: Deploy Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  K8S_OVERLAY: infra/k8s/overlays/dev
  REGISTRY: ghcr.io/${{ github.repository_owner }}/community-marketplace

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: pnpm --filter @community-marketplace/api exec prisma migrate deploy

      - name: Build & push images
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -f infra/docker/Dockerfile.api -t ${{ env.REGISTRY }}/api:dev-${{ github.sha }} .
          docker build -f infra/docker/Dockerfile.worker -t ${{ env.REGISTRY }}/worker:dev-${{ github.sha }} .
          docker build -f infra/docker/Dockerfile.web -t ${{ env.REGISTRY }}/web:dev-${{ github.sha }} .
          docker build -f infra/docker/Dockerfile.admin -t ${{ env.REGISTRY }}/admin:dev-${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/api:dev-${{ github.sha }}
          docker push ${{ env.REGISTRY }}/worker:dev-${{ github.sha }}
          docker push ${{ env.REGISTRY }}/web:dev-${{ github.sha }}
          docker push ${{ env.REGISTRY }}/admin:dev-${{ github.sha }}

      - name: Deploy to Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.DEV_KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl apply -k ${{ env.K8S_OVERLAY }}
          kubectl rollout status deployment/dev-api -n community-marketplace --timeout=300s

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "Dev deploy ${{ job.status }} — ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
