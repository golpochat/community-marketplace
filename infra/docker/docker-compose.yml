# Local / staging stack — Community Marketplace
# Usage: docker compose -f infra/docker/docker-compose.yml up -d

services:
  traefik:
    image: traefik:v3.6.1
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ../traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - cm-network

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ../../apps/api/.env.example
    environment:
      MEILISEARCH_HOST: http://meilisearch:7700
    depends_on:
      - postgres
      - redis
      - meilisearch
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.localhost`)
      - traefik.http.services.api.loadbalancer.server.port=4000
    networks:
      - cm-network

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_URL: http://api.localhost/api
    depends_on:
      - api
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`localhost`)
      - traefik.http.services.web.loadbalancer.server.port=3000
    networks:
      - cm-network

  meilisearch:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.meilisearch
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-master-key}
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:7700/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cm-network

  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: cm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cm_dev_password}
      POSTGRES_DB: community_marketplace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cm-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - cm-network

volumes:
  postgres_data:
  redis_data:
  meili_data:

networks:
  cm-network:
    driver: bridge
