# Production simulation — Traefik TLS, observability, resource limits
# Usage: docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.prod up -d
# Required in .env.prod: POSTGRES_PASSWORD, JWT_SECRET, MEILI_MASTER_KEY
# Optional with defaults: DOMAIN, ACME_EMAIL

name: community-marketplace-prod

x-api-env: &api-env
  NODE_ENV: production
  PORT: 4000
  DATABASE_URL: postgresql://cm:${POSTGRES_PASSWORD}@postgres:5432/community_marketplace
  REDIS_URL: redis://redis:6379
  MEILISEARCH_HOST: http://meilisearch:7700
  MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY}
  JWT_SECRET: ${JWT_SECRET}
  CORS_ORIGIN: https://${DOMAIN:-sellnearby.ie},https://www.${DOMAIN:-sellnearby.ie},https://admin.${DOMAIN:-sellnearby.ie}
  WEB_APP_URL: https://${DOMAIN:-sellnearby.ie}
  API_PUBLIC_URL: https://api.${DOMAIN:-sellnearby.ie}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:-noreply@${DOMAIN}}
  RBAC_SEED_ENABLED: ${RBAC_SEED_ENABLED:-false}
  RBAC_SEED_FORCE: ${RBAC_SEED_FORCE:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  LOG_LEVEL: info

services:
  traefik:
    image: traefik:v3.6.1
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-support@sellnearby.ie}
    command:
      - --configFile=/etc/traefik/traefik.prod.yml
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-support@sellnearby.ie}
      - --certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../traefik/traefik.prod.yml:/etc/traefik/traefik.prod.yml:ro
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_acme:/etc/traefik/acme
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - cm-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: community_marketplace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cm"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - cm-network

  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cm-network

  meilisearch:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.meilisearch
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
    networks:
      - cm-network

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.${DOMAIN:-sellnearby.ie}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=4000
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    networks:
      - cm-network

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    environment:
      <<: *api-env
      WORKER_HEALTH_PORT: 4001
    depends_on:
      - api
      - redis
    deploy:
      replicas: 1
    networks:
      - cm-network

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN:-sellnearby.ie}/api
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${DOMAIN:-sellnearby.ie}`) || Host(`www.${DOMAIN:-sellnearby.ie}`) || Host(`admin.${DOMAIN:-sellnearby.ie}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.tls.certresolver=letsencrypt
      - traefik.http.services.web.loadbalancer.server.port=3000
    networks:
      - cm-network

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    networks:
      - cm-network

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    networks:
      - cm-network

  loki:
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ../observability/loki.yml:/etc/loki/loki.yml:ro
    ports:
      - "3100:3100"
    networks:
      - cm-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ../observability/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - cm-network

volumes:
  postgres_data:
  redis_data:
  meili_data:
  traefik_acme:
  grafana_data:

networks:
  cm-network:
    name: cm-network
    driver: bridge
