# Encrypted at rest via Kubernetes encryption provider / Sealed Secrets in production.
# Create real secrets: kubectl create secret generic api-secrets --from-env-file=.env -n community-marketplace
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: community-marketplace
type: Opaque
stringData:
  JWT_SECRET: CHANGE_ME
  DATABASE_URL: postgresql://cm:CHANGE_ME@postgres:5432/community_marketplace
  REDIS_URL: redis://redis:6379
  STRIPE_SECRET_KEY: CHANGE_ME
  STRIPE_WEBHOOK_SECRET: CHANGE_ME
  MEILISEARCH_API_KEY: CHANGE_ME
  R2_ACCOUNT_ID: CHANGE_ME
  R2_ACCESS_KEY_ID: CHANGE_ME
  R2_SECRET_ACCESS_KEY: CHANGE_ME
  SENDGRID_API_KEY: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: community-marketplace
type: Opaque
stringData:
  POSTGRES_USER: cm
  POSTGRES_PASSWORD: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: meilisearch-secrets
  namespace: community-marketplace
type: Opaque
stringData:
  MEILI_MASTER_KEY: CHANGE_ME
