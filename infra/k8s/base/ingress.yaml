apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: community-marketplace
  namespace: community-marketplace
  annotations:
    # TODO: configure ingress controller (nginx, traefik, etc.)
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - community.market
        - api.community.market
      secretName: cm-tls
  rules:
    - host: community.market
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: api.community.market
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 4000
