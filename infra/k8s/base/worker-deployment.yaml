apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: community-marketplace
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: community-marketplace/worker:latest
          env:
            - name: BULLMQ_MODE
              value: worker
            - name: WORKER_HEALTH_PORT
              value: "4001"
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secrets
          ports:
            - containerPort: 4001
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: community-marketplace
spec:
  selector:
    app: worker
  ports:
    - port: 4001
      targetPort: 4001
