apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: community-marketplace
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: community-marketplace/web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: web-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: community-marketplace
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
