apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: community-marketplace
  labels:
    app: api
spec:
  replicas: 2  # TODO: scale via HPA
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: community-marketplace/api:latest  # TODO: pin image digest
          ports:
            - containerPort: 4000
          env:
            - name: BULLMQ_MODE
              value: producer
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secrets
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: community-marketplace
spec:
  selector:
    app: api
  ports:
    - port: 4000
      targetPort: 4000
