global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    metrics_path: /api/metrics
    static_configs:
      - targets: ["api:4000"]

  - job_name: traefik
    static_configs:
      - targets: ["traefik:8082"]
