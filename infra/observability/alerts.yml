groups:
  - name: community-marketplace
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status_code=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: High API error rate

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency above 2s

      - alert: QueueBacklog
        expr: bullmq_queue_waiting > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: BullMQ queue backlog is high

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 900000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Process memory usage is high
