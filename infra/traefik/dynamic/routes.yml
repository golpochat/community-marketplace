# Dynamic routing — Community Marketplace
# Mounted at /etc/traefik/dynamic/routes.yml
# Middlewares defined in middlewares.yml
#
# api / web / admin host routing is defined via Docker labels in
# infra/docker/docker-compose*.yml (and prod DOMAIN substitution).
# Keep only internal/static routes here to avoid router-name collisions.

http:
  routers:
    meilisearch:
      rule: Host(`search.internal.community.market`)
      entryPoints:
        - websecure
      service: meilisearch
      middlewares:
        - internal-only

  services:
    meilisearch:
      loadBalancer:
        servers:
          - url: http://meilisearch:7700
