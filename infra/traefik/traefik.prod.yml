# Traefik production configuration — Let's Encrypt + secured dashboard

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: cm-network
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    headers:
      defaultMode: drop

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${ACME_EMAIL:-ops@community.market}
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web
